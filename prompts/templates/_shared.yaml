# 全局共享配置：所有模板都隐式合并这些字段
# gen_assets.py 会先加载本文件，再用具体模板覆盖

# 风格锚点：所有资产共用，确保整个游戏视觉统一
style_anchor: |
  马荣成《风云》漫画美术风格，2.5D 漫画质感，
  港漫墨线分明，色彩浓郁有油画厚涂感，
  人物五官立体，肌肉线条有力，衣袂飘动有动势，
  整体氛围古风武侠、苍凉壮阔。

# 通用反向词：避免常见翻车
negative: |
  现代服装，3D CG 渲染感，照片级写实，
  网络红人脸，二次元萌系，迪士尼风，
  畸形手指，多余四肢，水印，签名，文字乱码

# 默认参数（具体模板可覆盖）
defaults:
  size: "1024x1024"
  quality: "medium"
  background: "opaque"   # GPT Image 2 不支持 transparent
  output_format: "png"
