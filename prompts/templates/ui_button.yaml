id: ui_button
description: UI 按钮（普通 / 悬停 / 按下三态）
quality: medium
size: "1024x1024"

identity_anchor: |
  港漫风武侠 UI 按钮，深棕底 + 金色描边 + 细腻纹理，
  与 Style Bible 中 UI Kit 完全一致。

reference_images:
  - "assets/_style_bible/04_ui_kit_sample.png"

prompt_template: |
  {style_anchor}

  武侠风游戏 UI 按钮，{{state}} 状态。

  规格：
  - 1024×1024 画布，按钮居中占 70%
  - 矩形圆角，长宽比 3:1
  - 深棕主体色（#3a2820）+ 金色描边（#c9a961）
  - 状态差异：
      normal  ：底色平实
      hover   ：金色描边发光
      pressed ：底色加深，按钮整体下沉感
  - 按钮中央显示**简体中文**文字「{{label}}」
    （必须是简体字，禁止繁体；字形端正、清晰、宋体或楷体）
    （字符必须严格按照「{{label}}」逐字对应，不能改写或替换）
  - 纯白色画布背景（rembg 抠取按钮本体）
  - 不要装饰性边框、不要外框阴影分散注意力

  反向：{negative}

variables:
  state: "normal | hover | pressed"
  label: "中文按钮文字，如：开始游戏 / 存档 / 退出"
